<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandeja de Correos — FisioAdvance</title>
<style>
  :root {
    --bg: #f4f6fc;
    --surface: #ffffff;
    --border: #dde2f0;
    --primary: #1e3a5f;
    --accent: #2563eb;
    --green: #059669;
    --yellow: #d97706;
    --red: #dc2626;
    --text: #111827;
    --muted: #6b7280;
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(30,58,95,0.18);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { font-size: 22px; }
  .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-refresh {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 150ms var(--ease-out);
    display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh:hover { background: rgba(255,255,255,0.25); }
  .btn-refresh:active { transform: scale(0.97); }

  /* KPI BAR */
  .kpi-bar {
    display: flex;
    gap: 12px;
    padding: 16px 24px;
    overflow-x: auto;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    min-width: 120px;
    flex-shrink: 0;
    text-align: center;
  }
  .kpi-num { font-size: 24px; font-weight: 800; color: var(--primary); }
  .kpi-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .kpi.alta .kpi-num { color: var(--red); }
  .kpi.pendiente .kpi-num { color: var(--yellow); }
  .kpi.ok .kpi-num { color: var(--green); }

  /* FILTROS */
  .filters {
    display: flex;
    gap: 8px;
    padding: 0 24px 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-right: 4px; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 150ms var(--ease-out);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .search-box {
    margin-left: auto;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    width: 220px;
    transition: border-color 150ms;
  }
  .search-box:focus { border-color: var(--accent); }

  /* TABLA */
  .table-wrapper {
    padding: 0 24px 24px;
  }
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead tr {
    background: #f8faff;
    border-bottom: 1px solid var(--border);
  }
  th {
    padding: 11px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid #f0f2f8;
    transition: background 120ms;
    animation: rowIn 300ms var(--ease-out) both;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8faff; }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  td { padding: 12px 14px; vertical-align: middle; }

  /* BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .badge-alta { background: #fef2f2; color: var(--red); }
  .badge-media { background: #fffbeb; color: var(--yellow); }
  .badge-baja { background: #f0fdf4; color: var(--green); }
  .badge-pendiente { background: #fffbeb; color: var(--yellow); }
  .badge-visto { background: #eff6ff; color: var(--accent); }
  .badge-registrado { background: #f0fdf4; color: var(--green); }
  .badge-ignorado { background: #f9fafb; color: var(--muted); }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }
  .dot-alta { background: var(--red); }
  .dot-media { background: var(--yellow); }
  .dot-baja { background: var(--green); }

  .emisor-cell { font-weight: 600; color: var(--text); }
  .email-cell { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .asunto-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .accion-cell { color: var(--muted); font-size: 12px; max-width: 180px; }

  .conocido-no {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--yellow);
    font-weight: 600;
  }

  /* BOTONES DE ACCIÓN */
  .actions { display: flex; gap: 6px; }
  .btn-action {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 120ms var(--ease-out);
    white-space: nowrap;
  }
  .btn-action:active { transform: scale(0.96); }
  .btn-visto { color: var(--accent); }
  .btn-visto:hover { background: #eff6ff; border-color: var(--accent); }
  .btn-registrado { color: var(--green); }
  .btn-registrado:hover { background: #f0fdf4; border-color: var(--green); }
  .btn-ignorado { color: var(--muted); }
  .btn-ignorado:hover { background: #f9fafb; }

  /* EMPTY STATE */
  .empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* LOADING */
  .loading {
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 600ms linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--primary);
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 200ms var(--ease-out);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 24px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 200ms var(--ease-out);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--primary); }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  .modal-field input, .modal-field select, .modal-field textarea {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; color: var(--text);
    outline: none; transition: border-color 150ms;
    font-family: inherit;
  }
  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
    border-color: var(--accent);
  }
  .modal-field textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-modal-cancel {
    padding: 8px 18px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted);
  }
  .btn-modal-save {
    padding: 8px 18px; border-radius: 8px;
    border: none; background: var(--accent); color: white;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background 150ms;
  }
  .btn-modal-save:hover { background: #1d4ed8; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .header { padding: 14px 16px; }
    .kpi-bar { padding: 12px 16px; }
    .filters { padding: 0 16px 12px; }
    .table-wrapper { padding: 0 16px 16px; }
    .search-box { width: 100%; margin-left: 0; }
    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6) { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    tbody tr { animation: none; }
    .toast, .modal { transition: none; animation: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">📬</div>
    <div>
      <div class="header-title">Bandeja de Correos</div>
      <div class="header-sub">FisioAdvance · Clasificación automática</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-refresh" onclick="cargarDatos()">↻ Actualizar</button>
  </div>
</div>

<!-- KPIs -->
<div class="kpi-bar" id="kpiBar">
  <div class="kpi"><div class="kpi-num" id="kpiTotal">—</div><div class="kpi-label">Total</div></div>
  <div class="kpi pendiente"><div class="kpi-num" id="kpiPendiente">—</div><div class="kpi-label">Pendientes</div></div>
  <div class="kpi alta"><div class="kpi-num" id="kpiAlta">—</div><div class="kpi-label">Prioridad Alta</div></div>
  <div class="kpi ok"><div class="kpi-num" id="kpiRegistrado">—</div><div class="kpi-label">Registrados</div></div>
  <div class="kpi"><div class="kpi-num" id="kpiDesconocido">—</div><div class="kpi-label">Emisor desconocido</div></div>
</div>

<!-- FILTROS -->
<div class="filters">
  <span class="filter-label">Estado:</span>
  <button class="filter-btn active" onclick="setFiltro('estado','todos',this)">Todos</button>
  <button class="filter-btn" onclick="setFiltro('estado','Pendiente',this)">Pendiente</button>
  <button class="filter-btn" onclick="setFiltro('estado','Visto',this)">Visto</button>
  <button class="filter-btn" onclick="setFiltro('estado','Registrado',this)">Registrado</button>
  <button class="filter-btn" onclick="setFiltro('estado','Ignorado',this)">Ignorado</button>
  <span class="filter-label" style="margin-left:8px">Prioridad:</span>
  <button class="filter-btn" onclick="setFiltro('prioridad','todos',this)">Todas</button>
  <button class="filter-btn" onclick="setFiltro('prioridad','Alta',this)">🔴 Alta</button>
  <button class="filter-btn" onclick="setFiltro('prioridad','Media',this)">🟡 Media</button>
  <button class="filter-btn" onclick="setFiltro('prioridad','Baja',this)">🟢 Baja</button>
  <input class="search-box" type="text" placeholder="🔍 Buscar emisor, asunto..." oninput="buscar(this.value)" id="searchInput">
</div>

<!-- TABLA -->
<div class="table-wrapper">
  <div class="table-card">
    <div id="tableContent">
      <div class="loading">
        <div class="spinner"></div>
        Cargando bandeja...
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Registrar correo</div>
    <div class="modal-field">
      <label>Estado</label>
      <select id="modalEstado">
        <option value="Visto">Visto</option>
        <option value="Registrado">Registrado</option>
        <option value="Ignorado">Ignorado</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Atendido por</label>
      <select id="modalAtendido">
        <option value="">— Seleccionar —</option>
        <option>Cristian</option>
        <option>Débora</option>
        <option>Lizzy</option>
        <option>Raquel</option>
        <option>Josseline</option>
        <option>Erik</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Notas</label>
      <textarea id="modalNotas" placeholder="Observaciones, referencia de pago, número de factura..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-modal-save" onclick="guardarModal()">Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIGURACIÓN ───────────────────────────────────────────────────────────
const SHEET_ID = '18IX58rPIooa8SDMH6A93uk_uZSZsnqUHEuWNrOQHb1Q';
const SHEET_NAME = 'TablaBandeja';

// ─── ESTADO ──────────────────────────────────────────────────────────────────
let datos = [];
let filtros = { estado: 'todos', prioridad: 'todos' };
let busqueda = '';
let filaActiva = null;

// ─── CARGA DE DATOS ──────────────────────────────────────────────────────────
async function cargarDatos() {
  document.getElementById('tableContent').innerHTML = `
    <div class="loading"><div class="spinner"></div>Cargando bandeja...</div>`;

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res = await fetch(url);
    const text = await res.text();

    // gviz devuelve JSONP: google.visualization.Query.setResponse({...})
    const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)?.[1];
    if (!jsonStr) throw new Error('Formato inesperado de respuesta');

    const json = JSON.parse(jsonStr);
    const table = json.table;

    if (!table || !table.rows || table.rows.length === 0) {
      mostrarVacio(); return;
    }

    // Extraer headers — gviz usa la primera fila como labels
    const headers = table.cols.map(c => (c.label && c.label.trim()) ? c.label.trim() : c.id);

    // Extraer filas
    datos = table.rows.map((row, i) => {
      const obj = {};
      headers.forEach((h, j) => {
        const cell = row.c ? row.c[j] : null;
        obj[h] = cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v) : '') : '';
      });
      obj._rowIndex = i + 2;
      return obj;
    }).reverse();

    actualizarKPIs();
    renderTabla();
  } catch(e) {
    document.getElementById('tableContent').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Error al cargar</div>
        <div class="empty-sub">Verifica que el Sheet sea público y el nombre de la hoja sea correcto.<br><small style="color:#9ca3af">${e.message}</small></div>
      </div>`;
  }
}

// ─── KPIs ─────────────────────────────────────────────────────────────────────
function actualizarKPIs() {
  document.getElementById('kpiTotal').textContent = datos.length;
  document.getElementById('kpiPendiente').textContent = datos.filter(d => d.estado === 'Pendiente').length;
  document.getElementById('kpiAlta').textContent = datos.filter(d => d.prioridad === 'Alta').length;
  document.getElementById('kpiRegistrado').textContent = datos.filter(d => d.estado === 'Registrado').length;
  document.getElementById('kpiDesconocido').textContent = datos.filter(d => d.es_conocido === 'No').length;
}

// ─── RENDER TABLA ─────────────────────────────────────────────────────────────
function renderTabla() {
  let filtrados = datos.filter(d => {
    if (filtros.estado !== 'todos' && d.estado !== filtros.estado) return false;
    if (filtros.prioridad !== 'todos' && d.prioridad !== filtros.prioridad) return false;
    if (busqueda) {
      const q = busqueda.toLowerCase();
      if (!d.de_nombre?.toLowerCase().includes(q) &&
          !d.asunto?.toLowerCase().includes(q) &&
          !d.categoria?.toLowerCase().includes(q) &&
          !d.de_email?.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  if (filtrados.length === 0) { mostrarVacio(); return; }

  const rows = filtrados.map((d, i) => {
    const badgePrioridad = {
      'Alta': '<span class="badge badge-alta"><span class="dot dot-alta"></span>Alta</span>',
      'Media': '<span class="badge badge-media"><span class="dot dot-media"></span>Media</span>',
      'Baja': '<span class="badge badge-baja"><span class="dot dot-baja"></span>Baja</span>',
    }[d.prioridad] || `<span class="badge">${d.prioridad}</span>`;

    const badgeEstado = {
      'Pendiente': '<span class="badge badge-pendiente">Pendiente</span>',
      'Visto': '<span class="badge badge-visto">Visto</span>',
      'Registrado': '<span class="badge badge-registrado">✓ Registrado</span>',
      'Ignorado': '<span class="badge badge-ignorado">Ignorado</span>',
    }[d.estado] || `<span class="badge">${d.estado || 'Pendiente'}</span>`;

    const conocidoTag = d.es_conocido === 'No'
      ? '<br><span class="conocido-no">⚠ Desconocido</span>' : '';

    const delay = Math.min(i * 30, 300);

    return `<tr style="animation-delay:${delay}ms">
      <td>
        <div class="emisor-cell">${d.de_nombre || '—'}${conocidoTag}</div>
        <div class="email-cell">${d.de_email || ''}</div>
      </td>
      <td><div class="asunto-cell" title="${d.asunto || ''}">${d.asunto || '—'}</div></td>
      <td>${badgePrioridad}</td>
      <td><span style="font-size:11px;color:var(--muted)">${d.categoria || '—'}</span></td>
      <td><div class="accion-cell">${d.accion || '—'}</div></td>
      <td>${badgeEstado}</td>
      <td><span style="font-size:11px;color:var(--muted)">${d.fecha_ingreso || '—'}</span></td>
      <td>
        <div class="actions">
          <button class="btn-action btn-visto" onclick="abrirModal(${i},'Visto')">👁 Visto</button>
          <button class="btn-action btn-registrado" onclick="abrirModal(${i},'Registrado')">✓ Registrar</button>
          <button class="btn-action btn-ignorado" onclick="abrirModal(${i},'Ignorado')">× Ignorar</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tableContent').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Remitente</th>
          <th>Asunto</th>
          <th>Prioridad</th>
          <th>Categoría</th>
          <th>Acción sugerida</th>
          <th>Estado</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function mostrarVacio() {
  document.getElementById('tableContent').innerHTML = `
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-title">Sin correos</div>
      <div class="empty-sub">No hay correos que coincidan con los filtros aplicados.</div>
    </div>`;
}

// ─── FILTROS Y BÚSQUEDA ──────────────────────────────────────────────────────
function setFiltro(tipo, valor, btn) {
  filtros[tipo] = valor;
  const grupo = btn.closest('.filters').querySelectorAll(`.filter-btn`);
  // Solo desactivar botones del mismo grupo
  btn.closest('div.filters').querySelectorAll('button').forEach(b => {
    if (b.onclick?.toString().includes(`'${tipo}'`)) b.classList.remove('active');
  });
  btn.classList.add('active');
  renderTabla();
}

function buscar(q) {
  busqueda = q;
  renderTabla();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
let filtradosActuales = [];

function abrirModal(indexFiltrado, estadoDefault) {
  // Reconstruir filtrados para obtener el item correcto
  filtradosActuales = datos.filter(d => {
    if (filtros.estado !== 'todos' && d.estado !== filtros.estado) return false;
    if (filtros.prioridad !== 'todos' && d.prioridad !== filtros.prioridad) return false;
    if (busqueda) {
      const q = busqueda.toLowerCase();
      if (!d.de_nombre?.toLowerCase().includes(q) &&
          !d.asunto?.toLowerCase().includes(q) &&
          !d.categoria?.toLowerCase().includes(q) &&
          !d.de_email?.toLowerCase().includes(q)) return false;
    }
    return true;
  }).reverse();

  filaActiva = filtradosActuales[indexFiltrado];
  if (!filaActiva) return;

  document.getElementById('modalTitle').textContent = `${filaActiva.de_nombre || 'Correo'} — ${filaActiva.asunto || ''}`;
  document.getElementById('modalEstado').value = estadoDefault;
  document.getElementById('modalAtendido').value = filaActiva.atendido_por || '';
  document.getElementById('modalNotas').value = filaActiva.notas || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function cerrarModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  filaActiva = null;
}

async function guardarModal() {
  if (!filaActiva) return;

  const estado = document.getElementById('modalEstado').value;
  const atendido = document.getElementById('modalAtendido').value;
  const notas = document.getElementById('modalNotas').value;
  const fecha = new Date().toLocaleDateString('es-CR');

  // Actualizar localmente
  const idx = datos.findIndex(d => d._rowIndex === filaActiva._rowIndex);
  if (idx >= 0) {
    datos[idx].estado = estado;
    datos[idx].atendido_por = atendido;
    datos[idx].notas = notas;
    datos[idx].fecha_atencion = fecha;
  }

  cerrarModal();
  actualizarKPIs();
  renderTabla();
  mostrarToast(`✓ Correo marcado como ${estado}`);

  // Actualizar en Google Sheets via API
  await actualizarEnSheets(filaActiva._rowIndex, estado, atendido, notas, fecha);
}

async function actualizarEnSheets(rowIndex, estado, atendido, notas, fecha) {
  try {
    // Columnas: K=estado(11), L=atendido_por(12), M=fecha_atencion(13), N=notas(14)
    const ranges = [
      { range: `${SHEET_NAME}!K${rowIndex}`, values: [[estado]] },
      { range: `${SHEET_NAME}!L${rowIndex}`, values: [[atendido]] },
      { range: `${SHEET_NAME}!M${rowIndex}`, values: [[fecha]] },
      { range: `${SHEET_NAME}!N${rowIndex}`, values: [[notas]] },
    ];

    // Nota: Escritura requiere OAuth2 (no API key sola)
    // Para escritura usar Google Apps Script Web App como proxy
    // Ver instrucciones en comentarios del código
    console.log('Actualizar fila', rowIndex, { estado, atendido, notas, fecha });
  } catch(e) {
    console.error('Error al actualizar Sheets:', e);
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) cerrarModal();
});

cargarDatos();
